services:
  # API Service (Backend) - Native Python
  - type: web
    name: ecopredict-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: 1
    autoDeploy: true

  # Frontend Service (React) - Static Site
  - type: web
    name: ecopredict-frontend
    runtime: static
    buildCommand: cd react-frontend && npm ci && npm run build
    staticPublishPath: ./react-frontend/build
    plan: free
    region: oregon
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: ecopredict-api
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true

# Optional: PostgreSQL Database
# Uncomment if you want to use PostgreSQL instead of CSV files
# databases:
#   - name: ecopredict-db
#     databaseName: ecopredict
#     user: ecopredict
#     plan: free  # Free tier: 90-day expiration, 1GB storage
#     region: oregon

# Optional: Redis Cache
# Uncomment if you want to add Redis for caching
# - type: redis
#   name: ecopredict-cache
#   ipAllowList: []  # Empty list = allow all
#   plan: free  # Free tier: 25MB, 30-day expiration
#   region: oregon
